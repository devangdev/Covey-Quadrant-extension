<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Things on my Plate</title>
  <link rel="icon" type="image/png" href="clock.png">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="matrix-container">
    <div class="quadrant q1" data-quadrant="q1">
      <div class="quad-title">Do First</div>
      <div class="quad-subtitle">Urgent & Important</div>
      <div class="task-list" id="list-q1"></div>
    </div>
    <div class="quadrant q2" data-quadrant="q2">
      <div class="quad-title">Schedule</div>
      <div class="quad-subtitle">Not Urgent & Important</div>
      <div class="task-list" id="list-q2"></div>
    </div>
    <div class="quadrant q3" data-quadrant="q3">
      <div class="quad-title">Delegate</div>
      <div class="quad-subtitle">Urgent & <br> Not Important</div>
      <div class="task-list" id="list-q3"></div>
    </div>
    <div class="quadrant q4" data-quadrant="q4">
      <div class="quad-title">Eliminate</div>
      <div class="quad-subtitle">Not Urgent & <br> Not Important</div>
      <div class="task-list" id="list-q4"></div>
    </div>

    <div class="center-plate" id="plate" data-quadrant="plate">
      <div class="plate-inner">
        <div class="plate-inner-header">
          <div class="plate-title">On My Plate</div>
          <button id="theme-toggle" class="theme-toggle" title="Toggle theme">🌙</button>
        </div>
        <form id="task-form">
          <input type="text" id="task-input" placeholder="Add a task..." autocomplete="off">
        </form>
        <div class="task-list plate-list" id="list-plate"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
